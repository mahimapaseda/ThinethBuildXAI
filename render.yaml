# BuildX AI — Render Blueprint
# Deploy as a single Web Service (frontend + backend on one port)

services:
  - type: web
    name: buildx-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
